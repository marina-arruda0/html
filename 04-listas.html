<!DOCTYPE html>
<html lang="pt-BR
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>listas em HTML 5</title>
</head>
<body>
    <h1>listas em HTML 5</h1>
    <h3>lista não ordenada</h3>
    <ul>
        <li>pão</li>
        <li>Leite</li>
        <li>café</li>
            

        
    </ul>

    <h3>lista ordenada</h3>
    <ol>
        <li>molhar o cabelo</li>
        <li>passar o shampoo</li>
        <li>enxaguar o cabelo para retirar o shampoo</li>
        <li>passar condicionador</li>
        <li>enxaguar o cabelo para retirar o condicionador</li>

    </ol>
</body>
</html>
